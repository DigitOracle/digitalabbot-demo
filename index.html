.dot.active{background:#FF3D2E;transform:scale(1.4);}
.dot::after{content:attr(title);position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;font-family:'Overpass Mono',monospace;font-size:9px;letter-spacing:.1em;white-space:nowrap;padding:4px 9px;border-radius:2px;opacity:0;pointer-events:none;transition:opacity .15s;}
.dot:hover::after{opacity:1;}
.nav-counter{font-family:'Overpass Mono',monospace;font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.45);min-width:56px;text-align:center;}
</style>

<script>
const TOTAL=8;let current=0,busy=false,hovered=false,autoTimer=null;
const deckEl=document.getElementById('deck'),cover=document.getElementById('cover'),
      counter=document.getElementById('counter'),dots=document.querySelectorAll('.dot');
function sizeDeck(){
  const size=Math.min(window.innerWidth,window.innerHeight-52-8,1080);
  deckEl.style.width=size+'px';deckEl.style.height=size+'px';
  const sc=size/1080;
  document.querySelectorAll('iframe').forEach(f=>f.style.transform=`scale(${sc})`);
}
sizeDeck();window.addEventListener('resize',sizeDeck);
function goTo(index){
  if(index>=TOTAL)index=0;if(index<0)index=TOTAL-1;
  if(busy||index===current)return;
  busy=true;cover.classList.add('flash');
  setTimeout(()=>{
    document.getElementById('wrap_'+current).style.display='none';
    dots[current].classList.remove('active');
    current=index;
    document.getElementById('wrap_'+current).style.display='block';
    dots[current].classList.add('active');
    counter.textContent=(current+1)+' / '+TOTAL;
    setTimeout(()=>{cover.classList.remove('flash');busy=false;},300);
  },240);
}
function changeSlide(dir){resetAutoTimer();goTo(current+dir);}
function startAutoTimer(){const delay=current===0?20000:7000;autoTimer=setTimeout(()=>{if(!hovered&&!busy){goTo(current+1);startAutoTimer();}},delay);}
function resetAutoTimer(){clearTimeout(autoTimer);startAutoTimer();}
deckEl.addEventListener('mouseenter',()=>{hovered=true;});
deckEl.addEventListener('mouseleave',()=>{hovered=false;});
startAutoTimer();
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){resetAutoTimer();goTo(current+1);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){resetAutoTimer();goTo(current-1);}
});
</script>

    // Am:  A  C  E
    [1.0, 1.189, 1.498],
    // F:   F  A  C
    [0.749, 1.0, 1.189],
    // C:   C  E  G
    [0.595, 0.749, 0.891],
    // G:   G  B  D
    [0.891, 1.122, 1.335],
  ];

  function buildReverb(ctx) {
    const len = ctx.sampleRate * 2.8;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
      }
    }
    const conv = ctx.createConvolver();
    conv.buffer = buf;
    return conv;
  }

  function makeVinylCrackle(ctx, dest) {
    // White noise filtered to crackle texture
    const bufLen = ctx.sampleRate * 4;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      // sparse pops
      d[i] = Math.random() < 0.002 ? (Math.random() - 0.5) * 0.4 : 
              Math.random() < 0.015 ? (Math.random() - 0.5) * 0.05 : 0;
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    const hpf = ctx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = 3000;
    const crackleGain = ctx.createGain();
    crackleGain.gain.value = 0.18;
    src.connect(hpf);
    hpf.connect(crackleGain);
    crackleGain.connect(dest);
    src.start();
    return src;
  }

  function makePad(ctx, freqs, reverb, dest, startTime, duration) {
    const fadeIn = 1.2, fadeOut = 1.4;
    freqs.forEach((freq, fi) => {
      // Slightly detune each oscillator for richness
      [-4, 0, 4].forEach((detune, di) => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.detune.value = detune;

        const g = ctx.createGain();
        g.gain.setValueAtTime(0, startTime);
        g.gain.linearRampToValueAtTime(0.04 / freqs.length, startTime + fadeIn);
        g.gain.setValueAtTime(0.04 / freqs.length, startTime + duration - fadeOut);
        g.gain.linearRampToValueAtTime(0, startTime + duration);

        osc.connect(g);
        g.connect(reverb);
        reverb.connect(dest);
        osc.start(startTime);
        osc.stop(startTime + duration + 0.1);
      });
    });
  }

  function makeBass(ctx, freq, dest, startTime, duration) {
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq / 2; // one octave down

    const g = ctx.createGain();
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(0.12, startTime + 0.3);
    g.gain.setValueAtTime(0.12, startTime + duration - 0.5);
    g.gain.linearRampToValueAtTime(0, startTime + duration);

    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 180;

    osc.connect(lpf);
    lpf.connect(g);
    g.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
  }

  function scheduleLoop(ctx, reverb, dest) {
    const chordDur = 5.5; // seconds per chord
    const loopDur = chordDur * chords.length;
    let t = ctx.currentTime + 0.1;

    function scheduleAll(offset) {
      chords.forEach((chord, ci) => {
        const freqs = chord.map(r => A2 * r);
        const ct = offset + ci * chordDur;
        makePad(ctx, freqs, reverb, dest, ct, chordDur + 0.5);
        makeBass(ctx, freqs[0], dest, ct, chordDur);
      });
    }

    scheduleAll(t);
    // Pre-schedule next loop
    scheduleAll(t + loopDur);

    // Keep scheduling ahead
    setInterval(() => {
      if (!playing) return;
      const now = ctx.currentTime;
      const elapsed = (now - t) % (loopDur * 2);
      if (elapsed > loopDur * 1.5) {
        scheduleAll(t + Math.ceil((now - t) / loopDur + 1) * loopDur);
      }
    }, 8000);
  }

  function startMusic() {
    if (started) return;
    started = true;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(ctx.destination);

    const reverb = buildReverb(ctx);
    makeVinylCrackle(ctx, masterGain);
    scheduleLoop(ctx, reverb, masterGain);

    // Fade in
    masterGain.gain.linearRampToValueAtTime(0.72, ctx.currentTime + 3.0);
    playing = true;
    barsWrap.classList.remove('paused');
    label.textContent = 'Lo-fi';
  }

  window.toggleMusic = function() {
    if (!started) {
      startMusic();
      return;
    }
    if (playing) {
      // Fade out then suspend
      masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.2);
      setTimeout(() => { if(ctx) ctx.suspend(); }, 1300);
      playing = false;
      barsWrap.classList.add('paused');
      label.textContent = 'Muted';
    } else {
      ctx.resume();
      masterGain.gain.linearRampToValueAtTime(0.72, ctx.currentTime + 1.2);
      playing = true;
      barsWrap.classList.remove('paused');
      label.textContent = 'Lo-fi';
    }
  };

  // Auto-start on first interaction (browser autoplay policy)
  function autoStart() {
    if (!started) startMusic();
    document.removeEventListener('click', autoStart);
    document.removeEventListener('keydown', autoStart);
  }
  document.addEventListener('click', autoStart);
  document.addEventListener('keydown', autoStart);

  // Also try immediate autoplay (works if user has interacted before)
  setTimeout(() => {
    try { startMusic(); } catch(e) {}
  }, 500);

})();
</script>
